<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soporte TI — Distrito Hotelero Plaza San Martín</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6a65;--text3:#9a9891;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --radius:8px;--radius-lg:12px;
  --blue-bg:#E6F1FB;--blue-text:#185FA5;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --green-bg:#EAF3DE;--green-text:#3B6D11;
  --gray-bg:#F1EFE8;--gray-text:#5F5E5A;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#252523;--bg3:#2c2c29;--text:#e8e6df;--text2:#9a9891;--text3:#6b6a65;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--blue-bg:#0c447c;--blue-text:#B5D4F4;--amber-bg:#633806;--amber-text:#FAC775;--green-bg:#27500A;--green-text:#C0DD97;--gray-bg:#444441;--gray-text:#D3D1C7;--red-bg:#791F1F;--red-text:#F7C1C1;}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}

/* Login screen */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:380px;overflow:hidden}
.login-header{background:#1a1a1a;padding:2rem;text-align:center}
.login-header img{height:48px;width:auto;filter:brightness(0) invert(1);opacity:.9;margin-bottom:1rem}
.login-header h1{font-size:16px;font-weight:400;color:#fff;letter-spacing:.08em;text-transform:uppercase}
.login-header p{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px}
.login-body{padding:1.5rem}
.login-tabs{display:flex;gap:0;margin-bottom:1.25rem;border:.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.login-tab{flex:1;padding:7px;font-size:13px;border:none;cursor:pointer;background:transparent;color:var(--text2)}
.login-tab.active{background:var(--text);color:var(--bg);font-weight:500}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.field input{width:100%;font-size:13px;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
.field input:focus{border-color:var(--text2)}
.btn-full{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:0;height:36px;font-size:13px;cursor:pointer;font-weight:500;margin-top:.25rem}
.btn-full:hover{opacity:.85}
.btn-full:disabled{opacity:.5;cursor:not-allowed}
.login-msg{font-size:12px;text-align:center;margin-top:.75rem;padding:.5rem;border-radius:var(--radius)}
.login-msg.error{background:var(--red-bg);color:var(--red-text)}
.login-msg.success{background:var(--green-bg);color:var(--green-text)}

/* App */
.app-wrap{display:none;flex-direction:column;min-height:100vh}
.app-wrap.visible{display:flex}
.topbar{background:#1a1a1a;padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.topbar-logo{height:32px;filter:brightness(0) invert(1);opacity:.85}
.topbar-divider{width:1px;height:28px;background:rgba(255,255,255,0.15)}
.topbar-title{font-size:14px;font-weight:400;color:#fff;letter-spacing:.05em}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-pill{font-size:12px;color:rgba(255,255,255,0.6);display:flex;align-items:center;gap:5px}
.user-avatar{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff}
.admin-badge{background:rgba(250,174,90,0.15);color:#FAC775;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid rgba(250,174,90,0.25)}
.btn-topbar{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:0 10px;height:28px;font-size:12px;cursor:pointer;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:4px}
.btn-topbar:hover{background:rgba(255,255,255,0.15)}

.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem;flex:1}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.page-head h2{font-size:18px;font-weight:500}
.page-head p{font-size:12px;color:var(--text3);margin-top:2px}
.btn-primary{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:0 16px;height:36px;font-size:13px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:6px}
.btn-primary:hover{opacity:.85}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--radius);padding:.875rem 1rem}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:24px;font-weight:500}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.toolbar input,.toolbar select{font-size:13px;padding:6px 10px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);height:34px;outline:none}
.toolbar input{flex:1;min-width:180px}
.ticket-list{display:flex;flex-direction:column;gap:8px}
.ticket{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1rem;cursor:pointer;transition:border-color .15s}
.ticket:hover{border-color:var(--border2)}
.ticket-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.ticket-title{font-size:14px;font-weight:500}
.ticket-id{font-size:11px;color:var(--text3);white-space:nowrap}
.ticket-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-abierto{background:var(--blue-bg);color:var(--blue-text)}
.b-en-proceso{background:var(--amber-bg);color:var(--amber-text)}
.b-resuelto{background:var(--green-bg);color:var(--green-text)}
.b-cerrado{background:var(--gray-bg);color:var(--gray-text)}
.cat-tag{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px}
.ticket-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.ticket-foot{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:.5px solid var(--border)}
.avatar{width:20px;height:20px;border-radius:50%;background:var(--blue-bg);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--blue-text)}
.user-info{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.prio{font-size:11px;display:flex;align-items:center;gap:3px}
.prio-alta{color:var(--red-text)}.prio-media{color:var(--amber-text)}.prio-baja{color:var(--green-text)}
.date{font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg)}
.empty i{font-size:28px;display:block;margin:0 auto 8px;opacity:.5}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:1rem;z-index:100}
.modal-wrap.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:.5px solid var(--border2);width:100%;max-width:480px;padding:1.375rem;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.125rem}
.modal-head h2{font-size:16px;font-weight:500}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;padding:2px 4px}
.close-btn:hover{color:var(--text2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.125rem}
.btn-cancel{background:transparent;border:.5px solid var(--border2);border-radius:var(--radius);padding:0 14px;height:34px;font-size:13px;cursor:pointer;color:var(--text2)}
.btn-cancel:hover{background:var(--bg2)}
.btn-submit{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:0 16px;height:34px;font-size:13px;cursor:pointer;font-weight:500}
.btn-submit:hover{opacity:.85}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:transparent;border:.5px solid var(--border2);border-radius:var(--radius);padding:0 14px;height:34px;font-size:13px;cursor:pointer;color:var(--red-text)}
.btn-danger:hover{background:var(--red-bg)}
.detail-body{font-size:13px;color:var(--text2);line-height:1.6;padding:.875rem;background:var(--bg2);border-radius:var(--radius);margin-bottom:1rem}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.di{font-size:12px}.di-label{color:var(--text3);margin-bottom:2px}.di-val{font-weight:500}
.status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.status-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:.5px solid var(--border2);cursor:pointer;background:var(--bg2);color:var(--text2)}
.status-btn:hover{background:var(--bg3)}
.status-btn.active{font-weight:500;border-color:var(--text);color:var(--text)}
.section-label{font-size:12px;color:var(--text3);margin-bottom:6px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius);font-size:13px;display:none;align-items:center;gap:8px;z-index:200;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{display:flex}.toast.error{background:var(--red-bg);color:var(--red-text)}
.info-box{background:var(--blue-bg);color:var(--blue-text);border-radius:var(--radius);padding:.75rem 1rem;font-size:12px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.row2{grid-template-columns:1fr}.topbar-logo{height:24px}.topbar-title{font-size:12px}}
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-header">
      <h1>Soporte TI</h1>
      <p>Distrito Hotelero Plaza San Martín</p>
    </div>
    <div class="login-body">
      <div class="login-tabs">
        <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="login-tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- Login form -->
      <div id="form-login">
        <div class="field"><label>Correo electrónico</label><input id="l-email" type="email" placeholder="tucorreo@empresa.com"></div>
        <div class="field"><label>Contraseña</label><input id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn-full" id="btn-login" onclick="doLogin()">Iniciar sesión</button>
      </div>

      <!-- Register form -->
      <div id="form-register" style="display:none">
        <div class="field"><label>Nombre completo</label><input id="r-name" type="text" placeholder="Tu nombre"></div>
        <div class="field"><label>Correo electrónico</label><input id="r-email" type="email" placeholder="tucorreo@empresa.com"></div>
        <div class="field"><label>Contraseña</label><input id="r-pass" type="password" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()"></div>
        <button class="btn-full" id="btn-register" onclick="doRegister()">Crear cuenta</button>
      </div>

      <div id="login-msg" class="login-msg" style="display:none"></div>
    </div>
  </div>
</div>

<!-- App -->
<div class="app-wrap" id="app-wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">SOPORTE TI</div>
      <div class="topbar-divider"></div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4)">Distrito Hotelero Plaza San Martín</div>
    </div>
    <div class="topbar-right">
      <span id="topbar-admin-badge" class="admin-badge" style="display:none"><i class="ti ti-shield" style="margin-right:3px"></i>Admin</span>
      <div class="user-pill"><div class="user-avatar" id="topbar-avatar">—</div><span id="topbar-email"></span></div>
      <button class="btn-topbar" onclick="doLogout()"><i class="ti ti-logout"></i>Salir</button>
    </div>
  </div>

  <div class="app">
    <div class="page-head">
      <div>
        <h2 id="page-title">Mis tickets</h2>
        <p id="page-sub"></p>
      </div>
      <button class="btn-primary" onclick="openNew()"><i class="ti ti-plus"></i>Nuevo ticket</button>
    </div>

    <div id="stats-wrap" style="display:none">
      <div class="stats">
        <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">—</div></div>
        <div class="stat"><div class="stat-label">Abiertos</div><div class="stat-val" id="s-open">—</div></div>
        <div class="stat"><div class="stat-label">En proceso</div><div class="stat-val" id="s-proc">—</div></div>
        <div class="stat"><div class="stat-label">Resueltos</div><div class="stat-val" id="s-done">—</div></div>
      </div>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Buscar tickets…" oninput="render()">
        <select id="f-estado" onchange="render()"><option value="">Todos los estados</option><option>Abierto</option><option>En proceso</option><option>Resuelto</option><option>Cerrado</option></select>
        <select id="f-cat" onchange="render()"><option value="">Todas las categorías</option><option>Red</option><option>Hardware</option><option>Software</option><option>Accesos</option><option>Impresoras</option><option>Otro</option></select>
        <select id="f-prio" onchange="render()"><option value="">Todas las prioridades</option><option>Alta</option><option>Media</option><option>Baja</option></select>
      </div>
    </div>

    <div class="ticket-list" id="list"><div class="loading"><i class="ti ti-loader" style="font-size:20px;display:block;margin:0 auto 8px"></i>Cargando…</div></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="ti ti-check" id="toast-icon"></i><span id="toast-msg"></span></div>

<!-- Modal nuevo ticket -->
<div class="modal-wrap" id="modal-new">
  <div class="modal">
    <div class="modal-head"><h2><i class="ti ti-plus" style="margin-right:5px"></i>Nuevo ticket</h2><button class="close-btn" onclick="closeNew()">×</button></div>
    <div class="field"><label>Título *</label><input id="n-title" type="text" placeholder="Describe el problema brevemente"></div>
    <div class="field"><label>Descripción</label><textarea id="n-desc" style="width:100%;font-size:13px;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;resize:vertical;min-height:80px;font-family:inherit;line-height:1.5" placeholder="Detalla el problema, equipo afectado…"></textarea></div>
    <div class="row2">
      <div class="field"><label>Categoría</label><select id="n-cat"><option>Red</option><option>Hardware</option><option>Software</option><option>Accesos</option><option>Impresoras</option><option>Otro</option></select></div>
      <div class="field"><label>Prioridad</label><select id="n-prio"><option>Media</option><option>Alta</option><option>Baja</option></select></div>
    </div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeNew()">Cancelar</button><button class="btn-submit" id="btn-create" onclick="createTicket()">Enviar ticket</button></div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal-wrap" id="modal-det">
  <div class="modal">
    <div class="modal-head"><div><div style="font-size:11px;color:var(--text3)" id="d-id"></div><h2 id="d-title" style="font-size:15px;margin-top:2px"></h2></div><button class="close-btn" onclick="closeDet()">×</button></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.875rem" id="d-badges"></div>
    <div class="detail-body" id="d-body"></div>
    <div class="detail-grid" id="d-info"></div>
    <div id="admin-actions" style="display:none"><div class="section-label">Cambiar estado</div><div class="status-row" id="d-status"></div></div>
    <div class="modal-btns"><button class="btn-danger" id="btn-delete" style="display:none" onclick="deleteTicket()"><i class="ti ti-trash" style="margin-right:3px"></i>Eliminar</button><button class="btn-cancel" onclick="closeDet()">Cerrar</button></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://mkaupezvsbsgehfoxxsl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rYXVwZXp2c2JzZ2VoZm94eHNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NjA0NzksImV4cCI6MjA5NzUzNjQ3OX0.40xJtvdkkXTFaPZEWDBFaj9RfFkOLF1ZC5_nBDPGElM';
const ADMIN_EMAIL='';//managed via supabase admins table
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const catIcon={Red:'ti-wifi',Hardware:'ti-device-desktop',Software:'ti-apps',Accesos:'ti-key',Impresoras:'ti-printer',Otro:'ti-help-circle'};
const statClass={Abierto:'b-abierto','En proceso':'b-en-proceso',Resuelto:'b-resuelto',Cerrado:'b-cerrado'};
const prioClass={Alta:'prio-alta',Media:'prio-media',Baja:'prio-baja'};
const prioIcon={Alta:'ti-arrow-up',Media:'ti-minus',Baja:'ti-arrow-down'};
let allTickets=[],currentId=null,nextNum=1,currentUser=null,isAdmin=false;

function pad(n){return 'TK-'+String(n).padStart(3,'0')}
function today(){return new Date().toISOString().slice(0,10)}
function fmt(d){if(!d)return '—';const[y,m,dy]=d.split('-');return dy+'/'+m+'/'+y}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}

function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-register').classList.toggle('active',t==='register');
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-register').style.display=t==='register'?'block':'none';
  document.getElementById('login-msg').style.display='none';
}

function showMsg(msg,isError=true){
  const el=document.getElementById('login-msg');
  el.textContent=msg;el.className='login-msg '+(isError?'error':'success');el.style.display='block';
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){showMsg('Completa todos los campos');return;}
  const btn=document.getElementById('btn-login');btn.disabled=true;btn.textContent='Entrando…';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showMsg(error.message);btn.disabled=false;btn.textContent='Iniciar sesión';return;}
  await initApp(data.user);
}

async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  if(!name||!email||!pass){showMsg('Completa todos los campos');return;}
  if(pass.length<6){showMsg('La contraseña debe tener al menos 6 caracteres');return;}
  const btn=document.getElementById('btn-register');btn.disabled=true;btn.textContent='Creando cuenta…';
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){showMsg(error.message);btn.disabled=false;btn.textContent='Crear cuenta';return;}
  showMsg('Cuenta creada. Ya puedes iniciar sesión.',false);
  btn.disabled=false;btn.textContent='Crear cuenta';
  switchTab('login');
  document.getElementById('l-email').value=email;
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;isAdmin=false;
  document.getElementById('app-wrap').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-pass').value='';
}

async function initApp(user){
  currentUser=user;
  const{data:adminData}=await sb.from('admins').select('email').eq('email',user.email).single();
  isAdmin=!!adminData;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-wrap').classList.add('visible');
  const name=user.user_metadata?.full_name||user.email;
  document.getElementById('topbar-email').textContent=name;
  document.getElementById('topbar-avatar').textContent=initials(name);
  document.getElementById('topbar-admin-badge').style.display=isAdmin?'inline-flex':'none';
  document.getElementById('page-title').textContent=isAdmin?'Todos los tickets':'Mis tickets';
  document.getElementById('stats-wrap').style.display=isAdmin?'block':'none';
  await loadTickets();
}

async function loadTickets(){
  let query=sb.from('tickets').select('*').order('id',{ascending:false});
  if(!isAdmin) query=query.eq('user_id',currentUser.id);
  const{data,error}=await query;
  if(error){showToast('Error: '+error.message,true);return;}
  allTickets=data||[];
  if(allTickets.length>0){const m=Math.max(...allTickets.map(t=>parseInt(t.codigo.replace('TK-',''))||0));nextNum=m+1;}
  const now=new Date();
  document.getElementById('page-sub').textContent='Actualizado '+now.toLocaleTimeString('es-HN',{hour:'2-digit',minute:'2-digit'});
  render();
}

function getFiltered(){
  if(!isAdmin) return allTickets;
  const q=document.getElementById('search').value.toLowerCase();
  const est=document.getElementById('f-estado').value;
  const cat=document.getElementById('f-cat').value;
  const prio=document.getElementById('f-prio').value;
  return allTickets.filter(t=>{
    if(q&&!t.titulo.toLowerCase().includes(q)&&!(t.descripcion||'').toLowerCase().includes(q))return false;
    if(est&&t.estado!==est)return false;
    if(cat&&t.categoria!==cat)return false;
    if(prio&&t.prioridad!==prio)return false;
    return true;
  });
}

function render(){
  if(isAdmin){
    document.getElementById('s-total').textContent=allTickets.length;
    document.getElementById('s-open').textContent=allTickets.filter(t=>t.estado==='Abierto').length;
    document.getElementById('s-proc').textContent=allTickets.filter(t=>t.estado==='En proceso').length;
    document.getElementById('s-done').textContent=allTickets.filter(t=>t.estado==='Resuelto').length;
  }
  const list=getFiltered();const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty"><i class="ti ti-ticket-off"></i>No hay tickets que mostrar.<br><br><button onclick="openNew()" style="margin-top:8px;background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px">Crear primer ticket</button></div>';return;}
  el.innerHTML=list.map(t=>'<div class="ticket" onclick="openDet('+t.id+')" role="button" tabindex="0"><div class="ticket-top"><div class="ticket-title">'+t.titulo+'</div><div class="ticket-id">'+t.codigo+'</div></div><div class="ticket-meta"><span class="badge '+(statClass[t.estado]||'b-abierto')+'">'+t.estado+'</span><span class="cat-tag"><i class="ti '+(catIcon[t.categoria]||'ti-help-circle')+'"></i>'+t.categoria+'</span></div><div class="ticket-desc">'+(t.descripcion||'')+'</div><div class="ticket-foot"><div class="user-info"><span class="avatar">'+initials(t.solicitante)+'</span>'+(t.solicitante||'—')+'</div><div style="display:flex;align-items:center;gap:10px"><span class="prio '+prioClass[t.prioridad]+'"><i class="ti '+prioIcon[t.prioridad]+'"></i>'+t.prioridad+'</span><span class="date">'+fmt(t.fecha)+'</span></div></div></div>').join('');
}

function openNew(){document.getElementById('modal-new').classList.add('open');}
function closeNew(){document.getElementById('modal-new').classList.remove('open');['n-title','n-desc'].forEach(id=>document.getElementById(id).value='');document.getElementById('btn-create').disabled=false;document.getElementById('btn-create').textContent='Enviar ticket';}

async function createTicket(){
  const titulo=document.getElementById('n-title').value.trim();
  if(!titulo){document.getElementById('n-title').focus();return;}
  const btn=document.getElementById('btn-create');btn.disabled=true;btn.textContent='Enviando…';
  const nombre=currentUser.user_metadata?.full_name||currentUser.email;
  const codigo=pad(nextNum);
  const{error}=await sb.from('tickets').insert([{
    codigo,titulo,
    descripcion:document.getElementById('n-desc').value.trim()||'Sin descripción adicional.',
    categoria:document.getElementById('n-cat').value,
    prioridad:document.getElementById('n-prio').value,
    estado:'Abierto',solicitante:nombre,fecha:today(),
    user_id:currentUser.id,user_email:currentUser.email
  }]);
  if(error){showToast('Error: '+error.message,true);btn.disabled=false;btn.textContent='Enviar ticket';return;}
  nextNum++;closeNew();await loadTickets();showToast('Ticket '+codigo+' enviado correctamente');
}

function openDet(id){
  currentId=id;const t=allTickets.find(x=>x.id===id);
  document.getElementById('d-id').textContent=t.codigo;
  document.getElementById('d-title').textContent=t.titulo;
  document.getElementById('d-body').textContent=t.descripcion||'Sin descripción.';
  document.getElementById('d-badges').innerHTML='<span class="badge '+(statClass[t.estado]||'b-abierto')+'">'+t.estado+'</span><span class="badge" style="background:var(--bg2);color:var(--text2)"><i class="ti '+(catIcon[t.categoria]||'ti-help-circle')+'" style="margin-right:3px"></i>'+t.categoria+'</span><span class="prio '+prioClass[t.prioridad]+'" style="font-size:12px;display:flex;align-items:center;gap:3px"><i class="ti '+prioIcon[t.prioridad]+'"></i>Prioridad '+t.prioridad+'</span>';
  document.getElementById('d-info').innerHTML='<div class="di"><div class="di-label">Solicitante</div><div class="di-val">'+(t.solicitante||'—')+'</div></div><div class="di"><div class="di-label">Correo</div><div class="di-val">'+(t.user_email||'—')+'</div></div><div class="di"><div class="di-label">Fecha</div><div class="di-val">'+fmt(t.fecha)+'</div></div><div class="di"><div class="di-label">Categoría</div><div class="di-val">'+t.categoria+'</div></div>';
  document.getElementById('admin-actions').style.display=isAdmin?'block':'none';
  document.getElementById('btn-delete').style.display=isAdmin?'inline-flex':'none';
  if(isAdmin){const estados=['Abierto','En proceso','Resuelto','Cerrado'];document.getElementById('d-status').innerHTML=estados.map(e=>'<button class="status-btn '+(e===t.estado?'active':'')+'" onclick="setStatus(\''+e+'\')">'+e+'</button>').join('');}
  document.getElementById('modal-det').classList.add('open');
}
function closeDet(){document.getElementById('modal-det').classList.remove('open');currentId=null;}

async function setStatus(est){
  const{error}=await sb.from('tickets').update({estado:est}).eq('id',currentId);
  if(error){showToast('Error: '+error.message,true);return;}
  await loadTickets();openDet(currentId);
}

async function deleteTicket(){
  if(!confirm('¿Eliminar este ticket?'))return;
  const codigo=allTickets.find(x=>x.id===currentId)?.codigo;
  const{error}=await sb.from('tickets').delete().eq('id',currentId);
  if(error){showToast('Error: '+error.message,true);return;}
  closeDet();await loadTickets();showToast('Ticket '+codigo+' eliminado');
}

function showToast(msg,isError=false){
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-icon').className=isError?'ti ti-alert-circle':'ti ti-check';
  el.className='toast show'+(isError?' error':'');
  setTimeout(()=>el.classList.remove('show'),4000);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeNew();closeDet();}});

// Check existing session
sb.auth.getSession().then(({data:{session}})=>{
  if(session) initApp(session.user);
});
sb.auth.onAuthStateChange((_,session)=>{
  if(!session&&currentUser){doLogout();}
});
</script>
</body>
</html>
